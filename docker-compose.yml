
services:
  postgres:
    image: postgres:15-alpine
    container_name: notification_postgres
    restart: always
    environment:
      POSTGRES_USER: notify_admin
      POSTGRES_PASSWORD: notify_secure_password123
      POSTGRES_DB: notification_engine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notify_admin -d notification_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: notification_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  api-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification_api_core
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=notify_admin
      - DB_PASSWORD=notify_secure_password123
      - DB_NAME=notification_engine
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DATABASE_URL=postgresql://notify_admin:notify_secure_password123@postgres:5432/notification_engine
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata: