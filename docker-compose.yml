version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: notification_postgres
    restart: always
    environment:
      POSTGRES_USER: notify_admin
      POSTGRES_PASSWORD: notify_secure_password123
      POSTGRES_DB: notification_engine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notify_admin -d notification_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: notification_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata: